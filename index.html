<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>5周年纪念日快乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}

/* 👇 这里让整个页面固定死，不拉伸、不缩放 */
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden; /* 禁止滚动 */
  background: #fff5f8;
}
body{
  display:flex;
  min-width: 1280px; /* 页面最小宽度固定 */
  min-height: 720px; /* 页面最小高度固定 */
}

/* 左侧导航 —— 完全不动 */
.nav{width:190px;background:#ff8fb8;height:100vh;position:fixed;padding-top:60px;box-shadow:2px 0 10px rgba(255,128,180,0.2);}
.nav a{display:block;color:#fff;text-align:center;padding:18px 0;text-decoration:none;font-size:17px;margin:12px 16px;border-radius:12px;background:#ff6a9d;transition:0.3s;}
.nav a:hover{background:#ff4685;transform:scale(1.05);}

/* 主内容 —— 完全不动 */
.main{
  margin-left:190px;
  padding:70px 50px;
  width:100%;
  min-height:100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 图片大小 —— 完全不动（你设的 1500×750） */
.main-img{
  width: 1500px;
  height: 750px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(255,120,170,0.3);
}
</style>
</head>
<body>

<div class="nav">
<a href="index.html">首页</a>
<a href="photo.html">我们的照片</a>
<a href="message.html">爱的留言</a>
</div>

<div class="main">
<img class="main-img" src="5years.jpg">
</div>

</body>
</html>
